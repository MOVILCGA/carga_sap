{% extends "base.html" %}

{% block title %}Carga Excel{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-8 col-lg-6">

            <!-- 🔙 VOLVER -->
            <div class="mb-4 text-center">
                <a href="{{ url_for('dashboard') }}" class="btn btn-light shadow-sm px-4">
                    <i class="bi bi-arrow-left"></i> Volver
                </a>
            </div>

            <!-- CARD -->
            <div class="card main-card p-4">

                <!-- HEADER -->
                <div class="text-center mb-4">
                    <h2 class="titulo">
                        <i class="bi bi-file-earmark-excel text-success"></i>
                        Carga Excel
                    </h2>
                    <p class="subtitulo">
                        Previsualiza y carga datos automáticamente
                    </p>
                </div>

                <!-- ALERTA -->
                <div id="alerta" class="alert d-none"></div>

                <!-- FORM -->
                <form id="formExcel" method="POST" enctype="multipart/form-data">

                    <!-- Archivo -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Archivo Excel</label>
                        <input type="file" name="file" class="form-control form-control-lg" accept=".xlsx,.xls" required>
                    </div>

                    <!-- Acción -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Acción</label>
                        <select name="accion" id="accion" class="form-select form-select-lg" required>
                            <option value="">Seleccionar opción</option>
                            <option value="crear">Crear nueva tabla</option>
                            <option value="agregar">Agregar a tabla existente</option>
                        </select>
                    </div>

                    <!-- Crear -->
                    <div id="crearDiv" class="mb-4 d-none">
                        <input type="text" name="tabla_crear" id="tabla_crear"
                               class="form-control form-control-lg"
                               placeholder="Nombre de la nueva tabla">
                    </div>

                    <!-- Agregar -->
                    <div id="agregarDiv" class="mb-4 d-none">
                        <select name="tabla_existente" id="tabla_existente" class="form-select form-select-lg">
                            <option value="">Seleccionar tabla</option>
                            {% for tabla in tablas %}
                                <option value="{{ tabla }}">{{ tabla }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- BOTÓN -->
                    <div class="text-center mt-4">
                        <button type="button" class="btn btn-success btn-lg px-5" id="btnPreview">
                            <i class="bi bi-eye"></i> Analizar Excel
                        </button>
                    </div>

                </form>

                <!-- LOADER -->
                <div id="loader" class="text-center mt-4 d-none">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2 text-muted">Procesando archivo...</p>
                </div>

            </div>

            <p class="text-center mt-3 text-muted">
                Sistema de carga de datos 🚀
            </p>

        </div>

    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/upload.js') }}"></script>
{% endblock %}
