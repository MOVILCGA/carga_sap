<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

<div class="login-container">

    <div class="card login-card shadow p-4">

        <h4 class="login-title">
            <i class="bi bi-person-circle"></i> Iniciar Sesión
        </h4>

        <form method="POST">

            <!-- Usuario -->
            <div class="mb-3">
                <label>Usuario</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <!-- Contraseña -->
            <div class="mb-3 position-relative">
                <label>Contraseña</label>
                <input type="password" name="password" id="password" class="form-control" required>

                <i class="bi bi-eye position-absolute password-toggle"
                   onclick="togglePassword()"></i>
            </div>

            <!-- Recordar -->
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="remember">
                <label class="form-check-label">Recordar sesión</label>
            </div>

            <!-- Botón -->
            <button class="btn btn-primary w-100 btn-login" id="btnLogin">
                <span id="btnText">Ingresar</span>
                <span id="loading" class="spinner-border spinner-border-sm d-none"></span>
            </button>

        </form>

        {% if error %}
            <div class="alert alert-danger mt-3 text-center">
                {{ error }}
            </div>
        {% endif %}

    </div>

</div>

<!-- JS -->
<script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>
</html>
