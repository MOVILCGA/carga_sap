<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- TU CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="login-container">

    <div class="card login-card p-4 shadow">

        <!-- TITULO -->
        <h3 class="login-title text-center mb-3">
            <i class="bi bi-person-circle"></i> Iniciar Sesión
        </h3>

        <!-- FORM -->
        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required>
            </div>

            <button class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> Ingresar
            </button>

        </form>

        <!-- ERROR -->
        {% if error %}
            <div class="alert alert-danger mt-3 text-center">
                <i class="bi bi-exclamation-triangle"></i> {{ error }}
            </div>
        {% endif %}

    </div>

    <!-- FOOTER -->
    <p class="text-center mt-3 text-muted" style="font-size: 13px;">
        Sistema de carga de datos
    </p>

</div>

</body>
</html>
