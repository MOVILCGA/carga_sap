<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vista previa</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- TU CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>

<body class="bg-light">

<div class="container preview-container mt-5">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <h2 class="preview-title">
            <i class="bi bi-eye text-success"></i>
            Vista previa del Excel
        </h2>
        <p class="text-muted">
            Verifica los datos antes de cargarlos a la base de datos
        </p>
    </div>

    <!-- 🚨 CAMBIOS DETECTADOS -->
    <div class="alert alert-warning shadow-sm">
        <h5 class="mb-2">
            <i class="bi bi-exclamation-triangle"></i>
            Cambios que se aplicarán al archivo
        </h5>

        <ul class="mb-0">
            {% for cambio in cambios %}
                <li>{{ cambio }}</li>
            {% endfor %}
        </ul>
    </div>

    <!-- TABLA -->
    <div class="preview-box table-responsive shadow-sm mt-4">
        {{ tabla|safe }}
    </div>

    <!-- ACCIONES -->
    <form action="/upload" method="POST" class="preview-actions mt-4 text-center">

        <!-- 🔥 IMPORTANTE: reenviar TODO -->
        <input type="hidden" name="accion" value="{{ accion }}">
        <input type="hidden" name="tabla_crear" value="{{ tabla_crear }}">
        <input type="hidden" name="tabla_existente" value="{{ tabla_existente }}">
        <input type="hidden" name="file_name" value="{{ archivo }}">

        <div class="d-flex justify-content-center gap-3 flex-wrap">

            <!-- CONFIRMAR -->
            <button class="btn btn-success px-4">
                <i class="bi bi-check-circle"></i> Confirmar y subir
            </button>

            <!-- CANCELAR -->
            <a href="/" class="btn btn-outline-secondary px-4">
                <i class="bi bi-arrow-left"></i> Cancelar
            </a>

        </div>

    </form>

</div>

</body>
</html>
