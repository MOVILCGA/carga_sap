<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resultado</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- TU CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>

<body>

<div class="container resultado-container">

    <div class="card shadow p-4 resultado-card">

        <!-- TÍTULO DINÁMICO -->
        <h2 class="resultado-title 
            {% if 'Error' in mensaje %}
                resultado-error
            {% else %}
                resultado-ok
            {% endif %}
        ">
            {% if 'Error' in mensaje %}
                ? Proceso fallido
            {% else %}
                ? Proceso completado
            {% endif %}
        </h2>

        <!-- MENSAJE -->
        <p class="fs-5 mt-3">{{ mensaje }}</p>

        <!-- REGISTROS -->
        {% if registros > 0 %}
            <p class="text-muted">
                Registros procesados: <strong>{{ registros }}</strong>
            </p>
        {% endif %}

        <!-- BOTÓN -->
        <div class="mt-4">
            <a href="/" class="btn btn-primary">
                ? Volver al inicio
            </a>
        </div>

    </div>

</div>

</body>
</html>
