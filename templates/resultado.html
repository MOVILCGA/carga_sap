<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resultado</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- TU CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">

    <!-- 🔥 Auto redirect (opcional) -->
    <script>
        setTimeout(() => {
            window.location.href = "/";
        }, 4000); // 4 segundos
    </script>
</head>

<body class="bg-light">

<div class="container resultado-container mt-5">

    <!-- 🔙 VOLVER ARRIBA -->
    <div class="mb-3">
        <a href="/" class="btn btn-outline-dark btn-sm">
            <i class="bi bi-arrow-left"></i> Volver al dashboard
        </a>
    </div>

    <div class="card shadow p-4 resultado-card text-center">

        <!-- TÍTULO DINÁMICO -->
        <h2 class="
            {% if 'Error' in mensaje %}
                text-danger
            {% else %}
                text-success
            {% endif %}
        ">
            {% if 'Error' in mensaje %}
                <i class="bi bi-x-circle"></i> Proceso fallido
            {% else %}
                <i class="bi bi-check-circle"></i> Proceso completado
            {% endif %}
        </h2>

        <!-- MENSAJE -->
        <p class="fs-5 mt-3">{{ mensaje }}</p>

        <!-- REGISTROS -->
        {% if registros > 0 %}
            <p class="text-muted">
                <i class="bi bi-database"></i>
                Registros procesados: <strong>{{ registros }}</strong>
            </p>
        {% endif %}

        <!-- INFO -->
        <p class="text-muted small mt-2">
            Serás redirigido automáticamente al dashboard...
        </p>

        <!-- BOTONES -->
        <div class="mt-4 d-flex justify-content-center gap-2 flex-wrap">

            <a href="/" class="btn btn-primary">
                <i class="bi bi-house"></i> Ir al Dashboard
            </a>

            <a href="/upload_form" class="btn btn-outline-secondary">
                <i class="bi bi-upload"></i> Subir otro archivo
            </a>

        </div>

    </div>

</div>

</body>
</html>
